name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build app bundle
        run: ./build.sh
      - name: Verify bundle exists
        run: test -x DisableSleep.app/Contents/MacOS/DisableSleep
